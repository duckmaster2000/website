<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Track Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="track-login.css" />
</head>
<body>
  <main class="tk-login-shell">
    <a class="tk-login-back" href="index.html">&larr; Back Home</a>
    <section class="tk-login-card">
      <h1 id="tkLoginTitle">Track Athlete Selection</h1>
      <p class="tk-login-sub" id="tkLoginSub">Choose your roster identity for this track dashboard.</p>

      <form id="tkLoginForm" novalidate>
        <label class="tk-login-label" for="tkLoginName">Select Your Name</label>
        <select id="tkLoginName" required>
          <option value="">Loading names...</option>
        </select>

        <label class="tk-login-label" for="tkLoginGender">Gender</label>
        <select id="tkLoginGender" required>
          <option value="">Select gender...</option>
          <option value="female">Girl</option>
          <option value="male">Boy</option>
        </select>

        <label class="tk-login-anon-toggle" for="tkAnonMode">
          <input id="tkAnonMode" type="checkbox" />
          <span>I don't do track. Continue anonymously.</span>
        </label>

        <button id="tkLoginSubmit" type="submit">Continue To Dashboard</button>
      </form>

      <p id="tkLoginError" class="tk-login-error" hidden></p>
      <p id="tkLoginInfo" class="tk-login-info" hidden></p>
      <p class="tk-login-note">You are already authenticated at the website level. This page just links your account to an athlete profile for track views.</p>
    </section>
  </main>
  <script src="site-auth.js"></script>
  <script src="track-login.js"></script>
</body>
</html>
